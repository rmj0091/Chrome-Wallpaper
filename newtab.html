<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>새 탭</title>
        <link rel="shortcut icon" href="/" type="image/x-icon" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="shortcutContainer"></div>

        <video id="bg-video" autoplay muted loop playsinline>
            <source src="./assets/wallpaper.mp4" type="video/mp4" />
            Your browser does not support the video tag.
        </video>

        <img id="bg-image" class="bg-image hidden" src="./assets/image.png" />

        <audio id="bg-audio" loop>
            <source src="./assets/audio.mp3" type="audio/mpeg" />
            Your browser does not support the audio tag.
        </audio>

        <button id="settingsButton" class="settings-btn">
            <span class="material-symbols-outlined">settings</span>
        </button>

        <div id="settingsPanel" class="settings-panel hidden">
            <button id="closeSettings" class="setting-close-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h2>설정</h2>
            <div class="setting-item">
                <div class="audioControlWrapper">
                    <button class="toggleButton" id="toggleButton">
                        <span id="audioIcon" class="material-symbols-outlined"
                            >volume_up</span
                        >
                    </button>
                    <input
                        type="range"
                        id="volumeSlider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="1"
                    />
                    <p id="volumeText">100%</p>
                </div>
                <div class="toggle-wrapper">
                    <label class="switch">
                        <input
                            type="checkbox"
                            class="toggle-input"
                            id="toggleSwitch-1"
                        />
                        <span class="slider"></span>
                    </label>
                    <span>일반인 코스플레이</span>
                </div>
                <div class="toggleWrapper">
                    <label class="switch">
                        <input
                            type="checkbox"
                            class="toggle-input"
                            id="toggleSwitch-update"
                        />
                        <span class="slider"></span>
                    </label>
                    <span>자동 업데이트 확인</span>
                </div>
                <div class="toggleWrapper">
                    <label class="switch">
                        <input
                            type="checkbox"
                            class="toggle-input"
                            id="toggleSwitch-greeting"
                        />
                        <span class="slider"></span>
                    </label>
                    <span>대사 표시</span>
                </div>
                <div class="nameWrapper">
                    <input
                        type="text"
                        id="nameInput"
                        placeholder="이름을 입력해주세요"
                        maxlength="5"
                        required
                    />
                    <button id="saveBtn">변경</button>
                </div>
                <div class="footerWarpper">
                    <a id="removeAllSearch">검색기록 제거</a>
                    <p id="version">v1.1.0</p>
                </div>
            </div>
        </div>

        <div id="notification-container" class="notification-container"></div>
        <div id="content" class="content">
            <div class="search-box">
                <input
                    id="search"
                    class="truncate"
                    autocomplete="off"
                    spellcheck="false"
                    role="combobox"
                    aria-controls="matches"
                    aria-expanded="false"
                    aria-description=""
                    placeholder="Google 검색 또는 URL 입력"
                    aria-live="polite"
                />
                <div
                    id="historySuggestions"
                    class="history-suggestions hidden"
                    role="listbox"
                    aria-label="검색 기록"
                ></div>
            </div>

            <h1 id="greeting"></h1>
        </div>

        <div class="clock-container">
            <div class="time" id="time"></div>
            <div class="date" id="date"></div>
        </div>
        <div id="addShortcut" class="none">
            <h2>바로가기 추가</h2>

            <button id="closeShortcut" class="close-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
            <input type="text" id="addName" max="10" placeholder="이름" />
            <input type="text" id="addUrl" placeholder="링크" />
            <button id="appendShortcut">추가</button>
        </div>
        <div id="checkJsLoad"></div>
    </body>

    <script src="./cdn/confetti.browser.min.js"></script>
    <script src="./cdn/hangul.min.js"></script>
    <script src="script.js"></script>
    <script src="error.js"></script>
</html>
